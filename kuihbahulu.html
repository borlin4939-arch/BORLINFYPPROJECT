<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kuih Bahulu AI</title>
<style>
body {font-family:Arial;background:#f4f4f4;padding:20px;}
.card {background:white;padding:15px;margin-top:10px;border-radius:10px;}
.best {border-left:5px solid green;}
</style>
</head>
<body>

<h1>🍪 Kuih Bahulu (Terengganu)</h1>

<label>🍯 Sweetness</label>
<select id="sweet">
<option value="low">🙂 Low</option>
<option value="high">😋 High</option>
</select>

<label>🍞 Texture</label>
<select id="texture">
<option value="soft">🥐 Soft</option>
<option value="hard">🍘 Hard</option>
</select>

<button onclick="recommend()">Recommend</button>

<div id="result"></div>

<script>

const foods=[
{name:"Rabiah Awang Akok & Bahulu", sweet:"high", texture:"soft", rating:4.7,map:"https://share.google/mUlPyXNcpbtE35jmS"},
{name:"Perusahaan Bahulu Kak Sal", sweet:"low", texture:"hard", rating:4.5,map:"https://share.google/vVg161io5wkSsRZrP"},
{name:"AKOK&BAHULU RHU RENDANG", sweet:"high", texture:"hard", rating:4.6,map:"https://share.google/yK7swKYwvsg5tPba5"},
{name:"BAHULU KAKSU BALOK", sweet:"low", texture:"soft", rating:4.4,map:"https://share.google/xTtamyG85F8snmjJi"},
{name:"Bahulu Seri Geliga", sweet:"high", texture:"soft", rating:4.8,map:"https://share.google/UtZICOGqqJTXirx0H"}
];

function aiText(s,t){
return `This kuih bahulu is recommended because it matches your preference for ${s} sweetness and ${t} texture.`;
}

function recommend(){

let s=document.getElementById("sweet").value;
let t=document.getElementById("texture").value;

let results=[];

for(let f of foods){

let score=0;

if(f.sweet===s) score+=5;
if(f.texture===t) score+=5;

score+=f.rating;

results.push({f,score});
}

results.sort((a,b)=>b.score-a.score);

let html="<h2>🥇 Top 5</h2>";

results.forEach((r,i)=>{
html+=`
<div class="card ${i==0?'best':''}">
<h3>#${i+1} ${r.f.name}</h3>
<p>⭐ ${r.f.rating}</p>
<p>${aiText(s,t)}</p>
<button onclick="window.open('${r.f.map}')">View Location</button>
</div>`;
});

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
