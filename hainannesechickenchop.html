<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chicken Chop AI</title>
<style>
body {font-family:Arial;background:#f4f4f4;padding:20px;}
.card {background:white;padding:15px;margin-top:10px;border-radius:10px;}
.best {border-left:5px solid green;}
</style>
</head>
<body>

<h1>🍗 Hainanese Chicken Chop (Johor)</h1>

<label>🍋 Sourness</label>
<select id="sour">
<option value="low">🙂 Low</option>
<option value="medium">😌 Medium</option>
<option value="high">😋 High</option>
</select>

<label>🌶 Spiciness</label>
<select id="spicy">
<option value="low">🙂 Mild</option>
<option value="medium">😌 Medium</option>
<option value="high">🔥 Spicy</option>
</select>

<label>☪️ Halal</label>
<select id="halal">
<option value="yes">Halal</option>
<option value="no">Non-Halal</option>
</select>

<button onclick="recommend()">Recommend</button>

<div id="result"></div>

<script>

const foods=[
{name:"Restoran Hua Mui JB", sour:"medium", spicy:"low", halal:"yes", rating:4.5, map:"https://share.google/wXz5zkKZr8AjWuydn"},
{name:"Hua Mui Aeon Mall Bandar Dato Onn", sour:"high", spicy:"medium", halal:"no", rating:4.6, map:"https://share.google/BhvognlJf7fLZABFX"},
{name:"IT Roo Café", sour:"low", spicy:"low", halal:"yes", rating:4.3, map:"https://share.google/c7Q4r4YbQmk65waUR"},
{name:"Restoran Hua Mui Eco Botanic", sour:"medium", spicy:"high", halal:"yes", rating:4.4, map:"https://share.google/sS27kI3dC1OH6fno9"},
{name:"馒头铺海南特色中西餐厅 Man Tou Pu Restaurant", sour:"high", spicy:"medium", halal:"no", rating:4.7, map:"https://share.google/CXRwIYpQxYoj3kYDX"}
];

function aiText(s,p,h){
let txt=`Recommended because it matches your ${s} sourness and ${p} spice preference, `;
txt+=h==="yes"?"while ensuring halal compliance.":"with more flexible ingredient options.";
return txt;
}

function recommend(){

let s=document.getElementById("sour").value;
let p=document.getElementById("spicy").value;
let h=document.getElementById("halal").value;

let results=[];

for(let f of foods){

let score=0;

if(f.sour===s) score+=4;
if(f.spicy===p) score+=4;
if(f.halal===h) score+=5;

score+=f.rating;

results.push({f,score});
}

results.sort((a,b)=>b.score-a.score);

let html="<h2>🥇 Top 5</h2>";

results.forEach((r,i)=>{
html+=`
<div class="card ${i==0?'best':''}">
<h3>#${i+1} ${r.f.name}</h3>
<p>⭐ ${r.f.rating}</p>
<p>${aiText(s,p,h)}</p>
<br>
<button onclick="window.open('${r.f.map}')">📍 View Location</button>
</div>`;
});

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
