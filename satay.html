<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sotong Goreng AI</title>
<style>
body {font-family:Arial;background:#f4f4f4;padding:20px;}
.card {background:white;padding:15px;margin-top:10px;border-radius:10px;}
.best {border-left:5px solid green;}
</style>
</head>
<body>

<h1>🦑 Satay Perlis</h1>

<label>🧂 Saltiness</label>
<select id="salt">
<option value="low">🙂 Low</option>
<option value="medium">😌 Medium</option>
<option value="high">😋 High</option>
</select>

<label>🌶 Spiciness</label>
<select id="spicy">
<option value="low">🙂 Mild</option>
<option value="medium">😌 Medium</option>
<option value="high">🔥 Spicy</option>
</select>

<button onclick="recommend()">Recommend</button>

<div id="result"></div>

<script>

const foods=[
{name:"satay pak ali", salt:"high", spicy:"high", rating:4.7,map:"https://share.google/AbctcEgoMfmGwRnsK"},
{name:"satay wakali", salt:"medium", spicy:"medium", rating:4.5,map:"https://share.google/AnMCAYzlV3uDn20Fz"},
{name:"Satay pak mak", salt:"low", spicy:"medium", rating:4.4,map:"https://share.google/AnMCAYzlV3uDn20Fz"},
{name:"Satehh lah", salt:"high", spicy:"low", rating:4.6,map:"https://share.google/VP1IMF7oJMbD8ZHKG"},
{name:"Satay abang adik", salt:"medium", spicy:"high", rating:4.8,map:"https://share.google/sE8cgFcVjMpzkty4t"}
];

function aiText(s,p){
return `This sotong goreng is recommended because it matches your preferred ${s} saltiness and ${p} spice level.`;
}

function recommend(){

let s=document.getElementById("salt").value;
let p=document.getElementById("spicy").value;

let results=[];

for(let f of foods){

let score=0;

if(f.salt===s) score+=4;
if(f.spicy===p) score+=4;

score+=f.rating;

results.push({f,score});
}

results.sort((a,b)=>b.score-a.score);

let html="<h2>🥇 Top 5</h2>";

results.forEach((r,i)=>{
html+=`
<div class="card ${i==0?'best':''}">
<h3>#${i+1} ${r.f.name}</h3>
<p>⭐ ${r.f.rating}</p>
<p>${aiText(s,p)}</p>
<button onclick="window.open('${r.f.map}')">View Location</button>
</div>`;
});

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
