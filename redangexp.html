<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redang Experience AI Recommendation</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-top:15px; }
.best { border-left: 6px solid green; }
table { width:100%; margin-top:10px; border-collapse: collapse; }
td, th { border:1px solid #ddd; padding:8px; text-align:center; }
</style>
</head>
<body>

<h1>🏝️ Redang Experience Recommendation</h1>

<div class="card">

<label>🤿 Activity</label>
<select id="activity">
<option value="diving">Diving</option>
<option value="snorkelling">Snorkelling</option>
<option value="hiking">Hiking</option>
<option value="surviving">Survival</option>
</select>

<label>⏱ Duration</label>
<select id="time">
<option value="2">2 Hours</option>
<option value="3">3 Hours</option>
<option value="4">4 Hours</option>
</select>

<label>💪 Level</label>
<select id="level">
<option value="easy">Not Hardcore</option>
<option value="hard">Hardcore</option>
</select>

<label>🏢 Company</label>
<select id="company">
<option value="any">Any</option>
<option value="summer">Summer Bay</option>
<option value="redang">Redang Bay</option>
</select>

<button onclick="recommend()">Get Experience</button>

</div>

<div id="result"></div>


<script>


const experiences = [
{ company:"Summer Bay", activity:"diving", time:"2", level:"easy", price:180,link:"https://www.summerbayresort.com.my/" ,img:"summerbay.png",map:"https://www.google.com/maps/dir//summer+bay+resort/data=!4m6!4m5!1m1!4e2!1m2!1m1!1s0x31b71c7ef563fab9:0x4012ec9e4467d960?sa=X&ved=1t:155782&ictx=111"},
{ company:"Summer Bay", activity:"diving", time:"4", level:"hard", price:300 ,link:"https://www.summerbayresort.com.my/",img:"summerbay.png",map:"https://www.google.com/maps/dir//summer+bay+resort/data=!4m6!4m5!1m1!4e2!1m2!1m1!1s0x31b71c7ef563fab9:0x4012ec9e4467d960?sa=X&ved=1t:155782&ictx=111"},
{ company:"Redang Bay", activity:"snorkelling", time:"2", level:"easy", price:120 ,link:"https://redangbay.com.my/",img:"redangbay.png",map:"https://www.google.com/maps/dir//redang+bay+resort/data=!4m6!4m5!1m1!4e2!1m2!1m1!1s0x31b710236b2ab5b5:0x451d6979a14f7cfd?sa=X&ved=1t:155782&ictx=111"},
{ company:"Redang Bay", activity:"hiking", time:"3", level:"hard", price:150 ,link:"https://redangbay.com.my/",img:"redangbay.png",map:"https://www.google.com/maps/dir//redang+bay+resort/data=!4m6!4m5!1m1!4e2!1m2!1m1!1s0x31b710236b2ab5b5:0x451d6979a14f7cfd?sa=X&ved=1t:155782&ictx=111"},
{ company:"Summer Bay", activity:"surviving", time:"4", level:"hard", price:250,link:"https://www.summerbayresort.com.my/" ,img:"summerbay.png",map:"https://www.google.com/maps/dir//summer+bay+resort/data=!4m6!4m5!1m1!4e2!1m2!1m1!1s0x31b71c7ef563fab9:0x4012ec9e4467d960?sa=X&ved=1t:155782&ictx=111"},
{ company:"Redang Bay", activity:"diving", time:"3", level:"medium", price:220 ,link:"https://redangbay.com.my/",img:"redangbay.png",map:"https://www.google.com/maps/dir//redang+bay+resort/data=!4m6!4m5!1m1!4e2!1m2!1m1!1s0x31b710236b2ab5b5:0x451d6979a14f7cfd?sa=X&ved=1t:155782&ictx=111"}
];


function generateAIText(level){
    if(level === "hard"){
        return "This experience is recommended because it matches your preference for a challenging and adventurous activity.";
    } else {
        return "This experience is recommended because it suits a more relaxed and enjoyable activity level.";
    }
}


function recommend(){

let activity=document.getElementById("activity").value;
let time=document.getElementById("time").value;
let level=document.getElementById("level").value;
let company=document.getElementById("company").value;

let results=[];

for(let e of experiences){

if(e.activity !== activity) continue;
if(e.time !== time) continue;


let score=0;


if((level==="hard" && e.level==="hard") || (level==="easy" && e.level==="easy")){
    score += 5;
}


if(company !== "any" && 
   ((company==="summer" && e.company==="Summer Bay") ||
    (company==="redang" && e.company==="Redang Bay"))){
    score += 3;
}

score += (300 - e.price);

results.push({e, score});
}


results.sort((a,b)=>b.score-a.score);


let best = results[0];


let html = `
<div class="card best">
<h2>🥇 Best Experience</h2>
<p>Activity: ${best.e.activity}</p>
<p>Company: ${best.e.company}</p>
<p>Duration: ${best.e.time} hours</p>
<p>Price: RM ${best.e.price}</p>
<p><b>AI Suggestion:</b> ${generateAIText(level)}</p>
<button class="card best" onclick="window.open('${best.e.link}')">Go to official webiste</button>
<button class="card best" onclick="window.open('${best.e.map}')">View Location</button>
<img src="${best.e.img}" alt="">
</div>
`;


html += `
<div class="card">
<h3>💰 Experience Comparison</h3>
<table>
<tr><th>Company</th><th>Activity</th><th>Time</th><th>Price</th></tr>
`;

results.forEach(r=>{
html += `<tr>
<td>${r.e.company}</td>
<td>${r.e.activity}</td>
<td>${r.e.time}h</td>
<td>RM ${r.e.price}</td>
</tr>`;
});

html += `</table></div>`;

document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
